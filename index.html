<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Игра 1000</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>🎲 Игра 1000</h1>
<div id="setup">
  <input id="playerName" placeholder="Имя игрока">
  <button onclick="addPlayer()">Добавить</button>
  <div id="playerList"></div>
  <button onclick="startGame()">▶ Начать игру</button>
</div>
<div id="game" style="display:none;">
  <div id="players"></div>
  <h2 id="currentPlayer"></h2>
  <div id="dice" class="dice">
    <span>0</span><span>0</span><span>0</span><span>0</span><span>0</span>
  </div>
  <p>Очки за ход: <span id="turnScore">0</span></p>
  <div class="log" id="log"></div>
  <div class="buttons">
    <button id="rollBtn" onclick="roll()">🎲 Бросить</button>
    <button id="takeBtn" onclick="takeScore()">💰 Забрать</button>
  </div>
  
</div>
</div>
<script src="./script.js"></script>
</body>
</html>
